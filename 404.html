<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — {короче}</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0A0A;--paper:#FAFAF7;--blue:#1E2EFF;--yellow:#F4E409;--grey:#8C8C86}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
nav{padding:18px 0;border-bottom:1px solid rgba(10,10,10,.12)}
.nav-in{display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Archivo Black','Arial Black',sans-serif;font-weight:900;font-size:20px}
.logo .bk{color:var(--blue)}
main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 24px}
.code{font-family:'Archivo Black','Arial Black',sans-serif;font-size:clamp(80px,15vw,160px);color:rgba(30,46,255,.1);line-height:1;margin-bottom:-20px}
h1{font-family:'Archivo Black','Arial Black',sans-serif;font-weight:900;text-transform:uppercase;font-size:clamp(18px,3vw,26px);margin-bottom:20px}
p{color:var(--grey);font-size:15px;margin-bottom:40px;max-width:40ch;margin-left:auto;margin-right:auto}
.links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:.03em;text-transform:uppercase;padding:14px 26px;transition:all .25s}
.btn-blue{background:var(--blue);color:var(--paper)}
.btn-blue:hover{opacity:.85}
.btn-outline{border:1px solid rgba(10,10,10,.25);color:var(--ink)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
footer{padding:24px 0;border-top:1px solid rgba(10,10,10,.12);text-align:center}
footer p{color:var(--grey);font-size:12px}
</style>
</head>
<body>
<nav><div class="wrap nav-in">
  <a class="logo" href="/">{<span class="bk">короче</span>}</a>
</div></nav>

<main>
  <div>
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Возможно, страница была перемещена или её никогда не существовало.</p>
    <div class="links">
      <a class="btn btn-blue" href="/">На главную</a>
      <a class="btn btn-outline" href="/tickets/">Афиша</a>
      <a class="btn btn-outline" href="/shows/">Спектакли</a>
    </div>
  </div>
</main>

<footer><div class="wrap">
  <p>© 2026 «Короче»</p>
</div></footer>

<script>
  // Автоматический редирект через 10 секунд
  setTimeout(()=>{ window.location.href='/'; }, 10000);
</script>
</body>
</html>
