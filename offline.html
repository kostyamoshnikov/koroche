<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нет подключения — {короче}</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0A0A0A;color:#FAFAF7;font-family:'JetBrains Mono',ui-monospace,monospace;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.mark{font-family:'Archivo Black','Arial Black',sans-serif;font-size:48px;color:#F4E409;margin-bottom:28px;letter-spacing:-.02em}
h1{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#FAFAF7;margin-bottom:8px;font-weight:500}
.divider{width:40px;height:2px;background:#F4E409;margin:28px auto}
p{color:#8C8C86;font-size:14px;line-height:1.7;max-width:30ch;margin:0 auto 6px}
.hint{font-size:12px;color:#5c5c58;margin-top:4px}
.btn{display:inline-block;margin-top:32px;font-size:12px;letter-spacing:.03em;text-transform:uppercase;padding:14px 28px;border:1px solid rgba(250,250,247,.25);color:#FAFAF7;text-decoration:none;transition:all .25s;cursor:pointer;background:none;font-family:inherit}
.btn:hover{border-color:#F4E409;color:#F4E409}
</style>
</head>
<body>
  <div class="mark">{ }</div>

  <h1>короче</h1>

  <div class="divider"></div>

  <p>Нет подключения к интернету</p>
  <p class="hint">Проверьте соединение и попробуйте снова</p>

  <button class="btn" onclick="window.location.reload()">Обновить страницу</button>
</body>
</html>
